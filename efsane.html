<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazreti Yasuo - Efsane Yasuo</title>
    <style>
        body, html { 
            height: 100%; 
            margin:0; 
            background:#000; 
            color:#fff; 
            font-family:Arial,sans-serif; 
            overflow:hidden; 
        }

        .background {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('assets/efsane-bg.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.38) contrast(1.15) saturate(0.85);
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 5;
            padding: 50px 30px;
            text-align: center;
            max-width: 900px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 { font-size: 3.5rem; text-shadow: 0 0 25px #ff0000; margin-bottom: 30px; }
        .lore { 
            font-size: 1.45rem; 
            line-height: 1.9; 
            color: #ffcccc; 
            margin: 40px 0; 
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .scare-btn {
            padding: 18px 50px;
            font-size: 1.7rem;
            background: #660000;
            color: #fff;
            border: 4px solid #ff0000;
            cursor: pointer;
            box-shadow: 0 0 40px #ff0000;
            transition: 0.4s;
        }
        .scare-btn:hover { background:#ff0000; transform:scale(1.1); }
        
        #scare { display:none; position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:100; }
        .shake { animation: shake 0.35s linear infinite; }
        @keyframes shake {
            0%,100% { transform: translate(3px,3px) rotate(0deg); }
            20% { transform: translate(-7px,-6px) rotate(-4deg); }
            40% { transform: translate(7px,7px) rotate(4deg); }
            60% { transform: translate(-6px,-5px) rotate(-3deg); }
            80% { transform: translate(6px,6px) rotate(3deg); }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <h1>HAZRETİ YASUO - EFSANE</h1>
        <p class="lore">
            Hadımköyün rüzgârı... Rcz den çıkan alev...<br><br>
            Yanlış suçlamalar, 1.5 ay haksız cezaevi...<br>
            Gerçek adı Mustafa Yavuz olan efsane, artık sadece bir yayıncı değil.<br>
            O, rüzgârın kendisi.<br><br>
            <strong>En iyi yayıncılar testine hazır mısın?</strong>
        </p>
        <button class="scare-btn" onclick="triggerJumpscare()">En iyi yayıncılar testine geç</button>
    </div>

    <img id="scare" src="scare.gif" alt="Jumpscare">
    
    <!-- SES DOSYALARI -->
    <audio id="clickSound" preload="auto">
        <source src="assets/click.mp3" type="audio/mpeg">
    </audio>
    <audio id="horrorSound" preload="auto">
        <source src="assets/horror.mp3" type="audio/mpeg">
    </audio>

    <script>
        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        function triggerJumpscare() {
            // Butona tıklayınca ses efekti
            const clickSound = document.getElementById('clickSound');
            clickSound.currentTime = 0;
            clickSound.volume = 0.7;
            clickSound.play().catch(() => {});

            goFullscreen();

            document.body.classList.add('shake');
            document.body.style.filter = 'brightness(2.3) saturate(3.2)';

            const scare = document.getElementById('scare');
            const horrorSound = document.getElementById('horrorSound');

            scare.style.display = 'block';
            horrorSound.currentTime = 0;
            horrorSound.volume = 1;
            horrorSound.play().catch(() => {});

            setTimeout(() => {
                scare.style.display = 'none';
                document.body.classList.remove('shake');
                document.body.style.filter = 'none';
                if (document.exitFullscreen) document.exitFullscreen();
            }, 4800);
        }
    </script>
</body>
</html>
