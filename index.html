<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazreti Yasuo | Resmi Biyografi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --red: #ff0000;
            --dark: #0a0000;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            background: linear-gradient(135deg, #1a0000, #000000);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }
        #welcome {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            transition: opacity 1.5s ease;
        }
        #welcome-image {
            max-width: 65%;
            border: 8px solid var(--red);
            box-shadow: 0 0 80px rgba(255,0,0,0.8);
            border-radius: 12px;
            transition: transform 0.6s;
        }
        #welcome:hover #welcome-image { transform: scale(1.05); }
        h1 {
            font-size: 4.2rem;
            margin: 30px 0 10px;
            text-shadow: 0 0 40px var(--red);
            letter-spacing: 6px;
        }
        .subtitle {
            font-size: 1.8rem;
            color: #ff6666;
            margin-bottom: 50px;
        }
        .enter-btn {
            padding: 18px 60px;
            font-size: 1.6rem;
            background: transparent;
            color: white;
            border: 3px solid var(--red);
            cursor: pointer;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .enter-btn:hover {
            background: var(--red);
            box-shadow: 0 0 40px var(--red);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div id="welcome">
        <img id="welcome-image" src="welcome.png" alt="Hazreti Yasuo">
        <h1>HAZRETİ YASUO</h1>
        <p class="subtitle">Mustafa Yavuz • Twitch'in Delisi</p>
        <button class="enter-btn" onclick="enterSite()">BİYOGRAFİYE GİRİŞ YAP</button>
    </div>

    <script>
        function enterSite() {
            document.getElementById('welcome').style.opacity = '0';
            setTimeout(() => {
                window.location.href = "biyografi.html";
            }, 1200);
        }
    </script>
    <audio id="clickSound" preload="auto">
        <source src="assets/click.mp3" type="audio/mpeg">
    </audio>
</body>
</html>
