<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazreti Yasuo Forum Sayfası</title>
   
    <!-- ===== FAVICON EKLEME ===== -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="favicon.png">
    <!-- ======================== -->

    <style>
        * { margin: 0; padding: 0; overflow: hidden; }
        body, html {
            height: 100%;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        /* Hoş Geldin Paneli */
        #welcome-panel {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #1a0000, #000000);
            z-index: 30;
            cursor: pointer;
            transition: opacity 1.2s ease;
        }
        #welcome-image {
            max-width: 75%;
            max-height: 55%;
            margin-bottom: 40px;
            border: 5px solid #880000;
            box-shadow: 0 0 50px #ff0000,
                        0 0 80px rgba(255, 0, 0, 0.6);
        }
        #welcome-text {
            font-size: 3.5rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 25px #ff0000,
                         0 0 40px #ff0000;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }
        #sub-text {
            font-size: 1.8rem;
            color: #ff6666;
            text-shadow: 0 0 15px #ff0000;
            margin-bottom: 40px;
        }
        #click-hint {
            font-size: 1.4rem;
            color: #ff9999;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        /* Jumpscare */
        #scare {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 10;
        }
        .shake {
            animation: shake 0.35s linear infinite;
        }
        @keyframes shake {
            0%, 100% { transform: translate(2px, 2px) rotate(0deg); }
            20% { transform: translate(-5px, -5px) rotate(-3deg); }
            40% { transform: translate(5px, 5px) rotate(3deg); }
            60% { transform: translate(-4px, -3px) rotate(-2deg); }
            80% { transform: translate(4px, 4px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <!-- Hoş Geldin Paneli -->
    <div id="welcome-panel">
        <img id="welcome-image" src="welcome.png" alt="Hazreti Yasuo">
        <h1 id="welcome-text">FORUMA HOŞ GELDİN</h1>
        <p id="sub-text">-KutukSokan31</p>
        <p id="click-hint">Foruma giriş yapmak için tıklayınız.</p>
    </div>

    <!-- Jumpscare GIF -->
    <img id="scare" src="scare.gif" alt="Jumpscare">

    <!-- Ses Dosyası -->
    <audio id="horrorSound" preload="auto">
        <source src="horror.mp3" type="audio/mpeg">
    </audio>

    <script>
        const welcomePanel = document.getElementById('welcome-panel');
        const scareImg = document.getElementById('scare');
        const sound = document.getElementById('horrorSound');

        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        // ===== YENİ EKLENEN KISIM: F11 ile çıkarken onay mesajı =====
        window.addEventListener('beforeunload', function(e) {
            // Sadece tam ekranda ise uyarı göster (çoğu tarayıcıda etkili)
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                e.preventDefault();
                e.returnValue = "Tam ekrandan çıkmak istediğinizden emin misiniz?\n\nJumpscare devam edebilir.";
                return e.returnValue;
            }
        });
        // ===========================================================

        // Tıklama olayı
        document.addEventListener('click', function() {
            // Hoş geldin panelini kaldır
            welcomePanel.style.opacity = '0';
          
            setTimeout(() => {
                welcomePanel.style.display = 'none';
            }, 1200);

            // Tam ekrana geç
            goFullscreen();

            // Ekran sarsılma efekti
            document.body.classList.add('shake');
            document.body.style.filter = 'brightness(2.1) saturate(2.8)';

            // Jumpscare başlat
            scareImg.style.display = 'block';
          
            // Ses çal
            sound.currentTime = 0;
            sound.volume = 1.0;
            sound.play().catch(e => {
                console.log("Ses hatası:", e);
                alert("Ses çalamadı!\n\nTarayıcıyı yenile (Ctrl + F5) ve tekrar dene.");
            });

            // 4.5 saniye sonra bitir
            setTimeout(() => {
                scareImg.style.display = 'none';
                document.body.classList.remove('shake');
                document.body.style.filter = 'none';
              
                if (document.exitFullscreen) document.exitFullscreen();
            }, 4500);
        });
    </script>
</body>
</html>
