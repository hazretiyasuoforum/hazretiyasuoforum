<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>FETÖ STRIKE - KutukSokan31</title>
    <style>
        body { 
            margin:0; padding:0; background:#000; overflow:hidden; 
            height:100vh; display:flex; justify-content:center; align-items:center; 
            font-family: 'Courier New', monospace;
        }
        canvas { 
            border:3px solid #0ff; 
            box-shadow:0 0 50px #0ff; 
        }
        #header {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            z-index: 20;
            color: #0ff;
            text-shadow: 0 0 15px #0ff;
        }
        #header h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 3px;
        }
        #ui { 
            position:absolute; top:55px; left:15px; color:#0ff; 
            font-size:24px; text-shadow:0 0 10px #0ff; z-index:10; 
        }
        #gameOver, #jumpscare { 
            position:absolute; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.97); display:none; 
            flex-direction:column; justify-content:center; align-items:center; 
            color:#f00; z-index:100; 
        }
        .title { 
            font-size:70px; animation:glow 1s infinite alternate; 
        }
        @keyframes glow { 
            from { text-shadow:0 0 20px #f00; } 
            to { text-shadow:0 0 80px #f00; } 
        }
        button { 
            margin-top:30px; padding:15px 40px; font-size:22px; 
            background:#000; color:#0ff; border:3px solid #0ff; cursor:pointer; 
        }
        button:hover { background:#0ff; color:#000; }
        #jumpscare img { width:100%; height:100%; object-fit:cover; }
    </style>
</head>
<body>
    <!-- OYUN BAŞLIĞI -->
    <div id="header">
        <h1>FETÖ STRIKE - KutukSokan31</h1>
    </div>

    <div id="ui">
        PUAN: <span id="score">0</span>/200 &nbsp;&nbsp;&nbsp; 
        CAN: <span id="lives">5</span> &nbsp;&nbsp;&nbsp; 
        SEVİYE: <span id="level">1</span>
    </div>

    <canvas id="game" width="1000" height="600"></canvas>

    <div id="gameOver">
        <div class="title">GAME OVER</div>
        <div style="font-size:28px;margin:20px;">Final Puan: <span id="finalScore">0</span></div>
        <button onclick="restartGame()">YENİDEN BAŞLA</button>
    </div>

    <div id="jumpscare">
        <img src="scare.gif" alt="JUMPSCARE">
        <audio id="scareSound" src="jeff.mp3" preload="auto"></audio>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        const playerImg = new Image(); playerImg.src = "player.png";
        const enemyImg = new Image(); enemyImg.src = "enemy.png";

        let realScore = 0;      // Gerçek puan (85'te jumpscare)
        let displayedScore = 0; // Ekranda gösterilen (max 200)
        let lives = 5;          // Can sayısı 5 yapıldı
        let level = 1;
        let gameRunning = true;
        let passed = 0;

        let player = {x: 460, y: 480, w: 80, h: 80, speed: 9, shootCooldown: 0};
        let bullets = [], enemies = [], particles = [], stars = [];
        let keys = {};

        const scareDiv = document.getElementById("jumpscare");
        const scareSound = document.getElementById("scareSound");

        // Yıldız arka planı
        for (let i = 0; i < 200; i++) {
            stars.push({
                x: Math.random() * 1000,
                y: Math.random() * 600,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 3 + 1.5
            });
        }

        window.addEventListener("keydown", e => { keys[e.key] = true; });
        window.addEventListener("keyup", e => { keys[e.key] = false; });

        function createEnemy() {
            enemies.push({
                x: Math.random() * 880 + 50, 
                y: -80, 
                w: 70, 
                h: 70, 
                speed: 2.6 + level * 0.65
            });
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x, y,
                    vx: Math.random() * 14 - 7,
                    vy: Math.random() * 14 - 7,
                    life: 40,
                    size: Math.random() * 8 + 4
                });
            }
        }

        function coll(a, b) {
            return !(a.x > b.x + b.w || a.x + a.w < b.x || 
                     a.y > b.y + b.h || a.y + a.h < b.y);
        }

        function triggerJumpscare() {
            gameRunning = false;
            scareDiv.style.display = "flex";

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }

            scareSound.volume = 0.92;
            scareSound.currentTime = 0;
            scareSound.play().catch(() => {});

            setTimeout(() => {
                if (document.fullscreenElement) document.exitFullscreen();
                scareDiv.style.display = "none";
                document.getElementById("gameOver").style.display = "flex";
                document.getElementById("finalScore").textContent = realScore;
            }, 3500);
        }

        function update() {
            if (!gameRunning) return;

            if (keys["ArrowLeft"] || keys["a"]) player.x -= player.speed;
            if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;
            if (keys["ArrowUp"] || keys["w"]) player.y -= player.speed;
            if (keys["ArrowDown"] || keys["s"]) player.y += player.speed;

            player.x = Math.max(10, Math.min(910, player.x));
            player.y = Math.max(40, Math.min(510, player.y));

            if (keys[" "] && player.shootCooldown <= 0) {
                bullets.push({x: player.x + 36, y: player.y, w: 8, h: 25});
                player.shootCooldown = 6;
            }
            if (player.shootCooldown > 0) player.shootCooldown--;

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 17;
                if (bullets[i].y < -50) bullets.splice(i, 1);
            }

            if (Math.random() < 0.035 + level * 0.012) createEnemy();

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;

                if (coll(player, e)) {
                    createExplosion(player.x + 40, player.y + 40);
                    lives--;
                    enemies.splice(i, 1);
                    if (lives <= 0) {
                        gameRunning = false;
                        document.getElementById("gameOver").style.display = "flex";
                        document.getElementById("finalScore").textContent = realScore;
                    }
                    continue;
                }

                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (coll(bullets[j], e)) {
                        createExplosion(e.x + 35, e.y + 35);
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        break;
                    }
                }

                if (e.y > 620) {
                    realScore++;
                    passed++;
                    enemies.splice(i, 1);

                    // JUMPSCARE 85 PUANDA
                    if (passed >= 85) {
                        triggerJumpscare();
                        return;
                    }

                    if (realScore > level * 950) level++;
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--; p.vx *= 0.95; p.vy *= 0.95;
                if (p.life <= 0) particles.splice(i, 1);
            }

            displayedScore = Math.min(realScore, 200);
            document.getElementById("score").textContent = displayedScore;
            document.getElementById("lives").textContent = lives;
            document.getElementById("level").textContent = level;
        }

        function draw() {
            ctx.fillStyle = "#00051a";
            ctx.fillRect(0, 0, 1000, 600);

            // Yıldızlar
            ctx.fillStyle = "#ffffff";
            for (let s of stars) {
                ctx.globalAlpha = 0.8;
                ctx.fillRect(s.x, s.y, s.size, s.size);
                s.y += s.speed;
                if (s.y > 600) s.y = 0;
            }
            ctx.globalAlpha = 1;

            // Oyuncu
            if (playerImg.complete) ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);
            else {
                ctx.fillStyle = "#00ffff";
                ctx.fillRect(player.x + 20, player.y + 15, 40, 50);
            }

            // Mermiler
            ctx.fillStyle = "#00ff88";
            for (let b of bullets) ctx.fillRect(b.x, b.y, b.w, b.h);

            // Düşmanlar
            for (let e of enemies) {
                if (enemyImg.complete) ctx.drawImage(enemyImg, e.x, e.y, e.w, e.h);
                else {
                    ctx.fillStyle = "#ff4400";
                    ctx.fillRect(e.x + 15, e.y + 15, 40, 40);
                }
            }

            // Patlamalar
            for (let p of particles) {
                ctx.globalAlpha = p.life / 40;
                ctx.fillStyle = "#ffff00";
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function restartGame() {
            realScore = 0;
            displayedScore = 0;
            passed = 0;
            lives = 5;
            level = 1;
            bullets = [];
            enemies = [];
            particles = [];
            player.x = 460;
            player.y = 480;
            gameRunning = true;
            document.getElementById("gameOver").style.display = "none";
            scareDiv.style.display = "none";
            if (document.fullscreenElement) document.exitFullscreen();
        }

        // Başlangıç
        for (let i = 0; i < 5; i++) setTimeout(createEnemy, i * 400);
        gameLoop();
    </script>
</body>
</html>
