<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>GÜLEN SNAKE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000 url('background.jpg') center/cover no-repeat fixed;
            color: #0f0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 10px #0f0;
        }
        h1 {
            font-size: 46px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px #0f0, 0 0 50px #0f0;
            letter-spacing: 5px;
        }
        .info {
            font-size: 19px;
            margin: 10px 0;
            text-shadow: 0 0 10px #0f0;
        }
        canvas {
            border: 6px solid #0f0;
            background: #0a0a0a;
            image-rendering: pixelated;
            box-shadow: 0 0 40px #0f0, 0 0 80px rgba(0, 255, 0, 0.4);
        }
        #scoreDisplay {
            font-size: 26px;
            margin-top: 12px;
            text-shadow: 0 0 15px #0f0;
        }

        /* JUMPSCARE - TAM EKRAN KAPLASIN */
        #jumpscareContainer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #jumpscare {
            width: 100%;
            height: 100%;
            object-fit: cover;        /* Tüm ekranı kaplar */
            filter: brightness(1.15) contrast(1.25);
        }
        #fullscreenHint {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff0000;
            font-size: 28px;
            text-shadow: 0 0 20px #ff0000;
            background: rgba(0,0,0,0.8);
            padding: 12px 30px;
            border-radius: 10px;
            z-index: 100000;
            display: none;
        }
    </style>
</head>
<body>
    <h1>🐍 GÜLEN SNAKE - KUTUKSOKAN31</h1>
    <p class="info">OK TUŞLARI veya WASD ile hareket et FETönün anasını sikeyim</p>
    
    <canvas id="gameCanvas" width="600" height="600"></canvas>
    <p class="info" id="scoreDisplay">Skor: <span id="score">0</span></p>

    <div id="jumpscareContainer">
        <div id="fullscreenHint">Tam ekran için F11 tuşuna bas!</div>
        <img id="jumpscare" src="scare.gif" alt="SCARE">
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");
        const jumpscareContainer = document.getElementById("jumpscareContainer");
        const fullscreenHint = document.getElementById("fullscreenHint");

        const grid = 20;
        let count = 0;
        let score = 0;
        let gameOver = false;
        let jumpscareTriggered = false;

        const playerImage = new Image(); playerImage.src = "player.png";
        const enemyImage = new Image(); enemyImage.src = "enemy.png";
        const jumpSound = new Audio("jeff.mp3");

        let snake = { x: 300, y: 300, dx: grid, dy: 0, cells: [], maxCells: 4 };
        let apple = { x: 100, y: 100 };

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min)) + min;
        }

        function resetGame() {
            snake.x = 300; snake.y = 300;
            snake.cells = []; snake.maxCells = 4;
            snake.dx = grid; snake.dy = 0;
            score = 0;
            scoreElement.textContent = score;
            apple.x = getRandomInt(0, 30) * grid;
            apple.y = getRandomInt(0, 30) * grid;
            gameOver = false;
            jumpscareTriggered = false;
            jumpscareContainer.style.display = "none";
            fullscreenHint.style.display = "none";
        }

        async function goFullscreen() {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                }
            } catch (err) {
                console.log("Tam ekran açılamadı:", err);
                fullscreenHint.style.display = "block";
            }
        }

        document.addEventListener("keydown", e => {
            if (gameOver) return;
            const k = e.key.toLowerCase();
            if ((k === "arrowleft" || k === "a") && snake.dx !== grid) { snake.dx = -grid; snake.dy = 0; }
            else if ((k === "arrowup" || k === "w") && snake.dy !== grid) { snake.dx = 0; snake.dy = -grid; }
            else if ((k === "arrowright" || k === "d") && snake.dx !== -grid) { snake.dx = grid; snake.dy = 0; }
            else if ((k === "arrowdown" || k === "s") && snake.dy !== -grid) { snake.dx = 0; snake.dy = grid; }
        });

        function triggerJumpscare() {
            if (jumpscareTriggered) return;
            jumpscareTriggered = true;
            gameOver = true;

            jumpscareContainer.style.display = "flex";
            goFullscreen();                    // Otomatik tam ekran

            jumpSound.currentTime = 0;
            jumpSound.play().catch(() => {});

            // 3.5 saniye sonra kapat
            setTimeout(() => {
                if (document.fullscreenElement) {
                    document.exitFullscreen().catch(() => {});
                }
                jumpscareContainer.style.display = "none";
                fullscreenHint.style.display = "none";
                resetGame();
            }, 3500);
        }

        function loop() {
            requestAnimationFrame(loop);
            if (gameOver || ++count < 8) return;
            count = 0;

            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            snake.x += snake.dx;
            snake.y += snake.dy;

            if (snake.x >= canvas.width) snake.x = 0;
            if (snake.x < 0) snake.x = canvas.width;
            if (snake.y >= canvas.height) snake.y = 0;
            if (snake.y < 0) snake.y = canvas.height;

            snake.cells.unshift({ x: snake.x, y: snake.y });
            if (snake.cells.length > snake.maxCells) snake.cells.pop();

            // Elma çizimi
            if (enemyImage.complete) {
                ctx.drawImage(enemyImage, apple.x, apple.y, grid, grid);
            } else {
                ctx.fillStyle = "#f33";
                ctx.fillRect(apple.x + 2, apple.y + 2, grid - 4, grid - 4);
            }

            snake.cells.forEach((cell, index) => {
                if (playerImage.complete) {
                    ctx.drawImage(playerImage, cell.x, cell.y, grid, grid);
                } else {
                    ctx.fillStyle = "#0f0";
                    ctx.fillRect(cell.x + 1, cell.y + 1, grid - 2, grid - 2);
                }

                // Elma yeme kontrolü
                if (cell.x === apple.x && cell.y === apple.y) {
                    snake.maxCells++;
                    score += 10;
                    scoreElement.textContent = score;
                    apple.x = getRandomInt(0, 30) * grid;
                    apple.y = getRandomInt(0, 30) * grid;

                    // === SKOR 120 OLDUKTAN 4 SANİYE SONRA JUMPSCARE ===
                    if (score >= 120 && !jumpscareTriggered) {
                        setTimeout(triggerJumpscare, 4000);   // 4 saniye gecikme
                    }
                }

                // Kendine çarpma
                for (let i = index + 1; i < snake.cells.length; i++) {
                    if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                        resetGame();
                        return;
                    }
                }
            });
        }

        resetGame();
        requestAnimationFrame(loop);
    </script>
</body>
</html>
