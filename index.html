<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HZ YASUO vs KUTUKSOKAN31</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Creepster&family=Orbitron:wght@700&display=swap');
        
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* JUMPSCARE OVERLAY */
        #jumpscare-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: black;
            z-index: 1000000;
            justify-content: center;
            align-items: center;
        }
        #jumpscare-overlay img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* OYUN ALANI */
        #game-container {
            position: relative;
            width: 900px;
            height: 550px;
            background: radial-gradient(circle, #1a231a 0%, #000 100%);
            border: 4px solid #111;
            box-shadow: 0 0 50px rgba(255,0,0,0.1);
        }

        .goal {
            position: absolute;
            top: 60px;
            left: 200px;
            width: 500px;
            height: 230px;
            border: 5px solid #333;
            border-bottom: none;
        }

        /* KARAKTERLER */
        .player {
            position: absolute;
            transition: all 0.25s ease-out;
        }
        #shooter {
            bottom: 60px;
            left: 420px;
            z-index: 10;
        }
        #keeper {
            top: 180px;
            left: 420px;
            z-index: 5;
        }
        .yasuo {
            width: 60px;
            height: 110px;
            background: #8B0000;
            border-left: 15px solid #FFD700;
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
        }
        .keeper {
            width: 70px;
            height: 120px;
            background: #00008B;
            border-right: 15px solid #FEDD00;
            position: relative;
        }
        .keeper-eye {
            position: absolute;
            top: 20px;
            left: 5px;
            width: 60px;
            height: 6px;
            background: red;
            box-shadow: 0 0 20px red;
        }

        #ball {
            position: absolute;
            bottom: 110px;
            left: 435px;
            width: 35px;
            height: 35px;
            background: #fff;
            border-radius: 50%;
            z-index: 15;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* ALT PANEL */
        #ui {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }
        .btn {
            background: #050505;
            color: #fff;
            border: 1px solid #333;
            padding: 15px 40px;
            font-family: 'Orbitron';
            cursor: pointer;
            transition: 0.2s;
        }
        .btn:hover {
            border-color: red;
            color: red;
            background: #111;
        }

        #score-board {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            font-size: 20px;
            color: #555;
        }

        .shaking {
            animation: fast-shake 0.1s infinite;
        }

        @keyframes fast-shake {
            0% { transform: translate(3px, 3px); }
            50% { transform: translate(-3px, -3px); }
            100% { transform: translate(3px, -3px); }
        }

        /* İSİM ETİKETLERİ */
        .player-name {
            position: absolute;
            font-family: 'Orbitron';
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px black;
            z-index: 20;
        }
        #shooter-name {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
        }
        #keeper-name {
            top: 140px;
            left: 50%;
            transform: translateX(-50%);
            color: #00FFFF;
        }
    </style>
</head>
<body onclick="unlockAudio()">

    <div id="score-board">
        <div>GS SKOR: <span id="gs-score" style="color: #FFD700;">0</span></div>
        <div style="font-family: 'Creepster'; color: red; font-size: 30px;">GS FB DERBİ ÖZEL KUTUKSOKAN31 VS HZ YASUO</div>
    </div>

    <div id="game-container">
        <div class="goal"></div>
        
        <!-- Kaleci -->
        <div id="keeper" class="player">
            <div class="keeper"><div class="keeper-eye"></div></div>
            <div id="keeper-name" class="player-name">KutukSokan31</div>
        </div>
        
        <!-- Penaltı Atan -->
        <div id="shooter" class="player">
            <div class="yasuo"></div>
            <div id="shooter-name" class="player-name">HzYasuo</div>
        </div>
        
        <div id="ball"></div>
    </div>

    <div id="ui">
        <button class="btn" onclick="shoot('left')">SOL</button>
        <button class="btn" onclick="shoot('center')">ORTA</button>
        <button class="btn" onclick="shoot('right')">SAĞ</button>
    </div>

    <!-- JUMPSCARE ASSETS -->
    <div id="jumpscare-overlay">
        <img src="scare.gif">
    </div>
    <audio id="horror-snd" src="horror.mp3" preload="auto"></audio>

    <script>
        let gsScore = 0;
        let saves = 0;
        let isWaiting = false;
        let audioUnlocked = false;

        const ball = document.getElementById('ball');
        const keeper = document.getElementById('keeper');
        const gsScoreTxt = document.getElementById('gs-score');
        const horrorSnd = document.getElementById('horror-snd');
        const overlay = document.getElementById('jumpscare-overlay');

        function unlockAudio() {
            if (!audioUnlocked) {
                horrorSnd.play().then(() => {
                    horrorSnd.pause();
                    horrorSnd.currentTime = 0;
                    audioUnlocked = true;
                }).catch(() => {});
            }
        }

        function shoot(dir) {
            if (isWaiting || saves >= 6) return;
            isWaiting = true;

            // AI KARARI - Kurtarış olasılığı düşürüldü (%50)
            let aiDir = (Math.random() < 0.50) ? dir : ['left', 'center', 'right'].filter(x => x !== dir)[Math.floor(Math.random()*2)];

            applyMoves(dir, aiDir);

            setTimeout(() => {
                if (dir === aiDir) {
                    saves++;
                    if (saves === 6) {
                        triggerJumpscare();
                        return;
                    }
                } else {
                    gsScore++;
                    gsScoreTxt.innerText = gsScore;
                }
                setTimeout(resetGame, 1000);
            }, 400);
        }

        function applyMoves(pDir, kDir) {
            if (kDir === 'left') {
                keeper.style.left = '250px';
                keeper.style.transform = 'rotate(-25deg)';
            } else if (kDir === 'right') {
                keeper.style.left = '600px';
                keeper.style.transform = 'rotate(25deg)';
            } else {
                keeper.style.top = '210px';
            }

            ball.style.bottom = '350px';
            ball.style.transform = 'scale(0.6)';

            if (pDir === 'left') ball.style.left = '250px';
            else if (pDir === 'right') ball.style.left = '620px';
            else ball.style.left = '435px';
        }

        function resetGame() {
            ball.style.transition = 'none';
            ball.style.bottom = '110px';
            ball.style.left = '435px';
            ball.style.transform = 'scale(1)';

            keeper.style.transition = 'none';
            keeper.style.left = '420px';
            keeper.style.top = '180px';
            keeper.style.transform = 'rotate(0deg)';

            setTimeout(() => {
                ball.style.transition = 'all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1)';
                keeper.style.transition = 'all 0.25s ease-out';
                isWaiting = false;
            }, 50);
        }

        function triggerJumpscare() {
            horrorSnd.volume = 1.0;
            horrorSnd.play();

            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.mozRequestFullScreen) doc.mozRequestFullScreen();

            overlay.style.display = 'flex';
            document.body.classList.add('shaking');
        }
    </script>
</body>
</html>
