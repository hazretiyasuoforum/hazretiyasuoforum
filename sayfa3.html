<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazreti Yasuo - Efsane Yasuo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%;
            background: #0a0000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .content {
            position: relative;
            z-index: 5;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        h1 {
            font-size: 3.5rem;
            text-shadow: 0 0 20px #ff0000;
            margin-bottom: 20px;
        }
        .lore-text {
            font-size: 1.4rem;
            line-height: 1.8;
            color: #ffdddd;
            margin: 30px 0;
        }
        .final-button {
            padding: 15px 40px;
            font-size: 1.6rem;
            background: #880000;
            color: white;
            border: 3px solid #ff0000;
            cursor: pointer;
            box-shadow: 0 0 30px #ff0000;
            transition: all 0.3s;
        }
        .final-button:hover {
            background: #ff0000;
            transform: scale(1.1);
        }

        /* Jumpscare */
        #scare {
            display: none;
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 100;
        }
        .shake { animation: shake 0.35s linear infinite; }
        @keyframes shake {
            0%, 100% { transform: translate(3px, 3px) rotate(0deg); }
            20% { transform: translate(-6px, -6px) rotate(-4deg); }
            40% { transform: translate(6px, 6px) rotate(4deg); }
            60% { transform: translate(-5px, -4px) rotate(-3deg); }
            80% { transform: translate(5px, 5px) rotate(3deg); }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1>HAZRETİ YASUO - EFSANE</h1>
        <p class="lore-text">
            Ionia'nın rüzgarı kadar özgür, kılıcı kadar keskin...<br>
            Yanlış suçlamalarla kardeşini bile öldürmek zorunda kaldı.<br><br>
            Gerçek adı Mustafa Yavuz olan efsane, şimdi rüzgarı kontrol eden bir usta.<br>
            Ama unutma... rüzgar her zaman senin yanında değildir.
        </p>

        <button class="final-button" onclick="triggerJumpscare()">
            En iyi yayıncılar testine geç.
        </button>
    </div>

    <!-- Jumpscare -->
    <img id="scare" src="scare.gif" alt="Jumpscare">

    <audio id="horrorSound" preload="auto">
        <source src="horror.mp3" type="audio/mpeg">
    </audio>

    <script>
        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }

        function triggerJumpscare() {
            goFullscreen();

            document.body.classList.add('shake');
            document.body.style.filter = 'brightness(2.2) saturate(3)';

            const scareImg = document.getElementById('scare');
            const sound = document.getElementById('horrorSound');

            scareImg.style.display = 'block';
            sound.currentTime = 0;
            sound.volume = 1.0;
            sound.play().catch(() => {});

            // 4-5 saniye sonra bitsin
            setTimeout(() => {
                scareImg.style.display = 'none';
                document.body.classList.remove('shake');
                document.body.style.filter = 'none';
                if (document.exitFullscreen) document.exitFullscreen();
            }, 4800);
        }

        // Sayfa yüklendiğinde hafif bir efekt (isteğe bağlı)
        window.onload = () => {
            document.body.style.transition = 'filter 1s';
        };
    </script>
</body>
</html>
